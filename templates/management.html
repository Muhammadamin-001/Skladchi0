{% extends "base.html" %}
{% block content %}
<header class="top">
  <div>
    <h1>Sozlamalar</h1>
    <p>Foydalanuvchi roli, web paroli va tasdiqlash.</p>
  </div>
</header>

<section class="panel">
  <div class="table-wrap responsive-table">
    <table>
      <thead>
        <tr><th>Foydalanuvchi</th><th>User ID</th><th>Role</th><th>Tasdiq</th><th>Yangi parol</th><th></th></tr>
      </thead>
      <tbody>
        {% for u in users %}
        <tr>
          <form method="post" action="{{ url_for('web_update_user', user_id=u.user_id) }}">
            <td data-label="Foydalanuvchi">{{ u.username or u.first_name }}<small>{{ u.phone or '' }}</small></td>
            <td data-label="User ID">{{ u.user_id }}</td>
            <td data-label="Role">
              <select name="role">
                {% for item in crm_roles|sort %}
                <option value="{{ item }}" {{ 'selected' if (u.role or 'customer') == item }}>{{ item }}</option>
                {% endfor %}
              </select>
            </td>
            <td data-label="Tasdiq"><input type="checkbox" name="approved" {{ 'checked' if u.approved }}></td>
            <td data-label="Parol"><input name="password" placeholder="O'zgartirish uchun yozing"></td>
            <td><button>Saqlash</button></td>
          </form>
        </tr>
        {% else %}
        <tr><td colspan="6">Foydalanuvchi yo'q.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</section>
{% endblock %}
